<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>Portari — Kluis</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&display=swap" />
<style>
:root{--bg:#FFFFFF;--card:#FFFFFF;--grp:#F2F2F7;--label:#000;--sec:#8E8E93;--sep:#E7E7EC;--accent:#5E5CE6;--red:#FF3B30;--elev:#F4F4F8}
.dark{--bg:#000;--card:#1C1C1E;--grp:#000;--label:#fff;--sec:#98989F;--sep:#2C2C2E;--accent:#7D7AFF;--elev:#2C2C2E}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
i.ti{display:inline-flex;align-items:center;justify-content:center;width:1em;height:1em;line-height:1;vertical-align:-.125em;font-style:normal}
i.ti svg{width:1em;height:1em;display:block}
.navright{display:flex;align-items:center;gap:10px}
.langdd{position:relative}
.langdd-btn{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:18px;background:var(--elev);color:var(--label);font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--sep)}
.langdd-btn:active{opacity:.6}
.langdd-btn .fl{font-size:15px;line-height:1}
.langdd-btn .cv{font-size:11px;opacity:.6;margin-left:1px}
.langdd-menu{position:absolute;top:46px;right:0;background:var(--card);border:1px solid var(--sep);border-radius:18px;box-shadow:0 14px 36px rgba(0,0,0,.22);padding:7px;display:none;flex-direction:column;gap:2px;z-index:60;max-height:320px;overflow-y:auto;min-width:172px;scrollbar-width:none}
.langdd-menu::-webkit-scrollbar{display:none}
.langdd-menu.on{display:flex;animation:ddpop .16s ease}
@keyframes ddpop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.langdd-menu button{display:flex;align-items:center;gap:9px;padding:10px 13px;border-radius:12px;background:none;color:var(--label);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;text-align:left;white-space:nowrap;width:100%}
.langdd-menu button.on{background:var(--accent);color:#fff}
.langdd-menu button:active{background:var(--elev)}
.langdd-menu .fl{font-size:18px;line-height:1}
html,body{margin:0;height:100%;background:#000;font-family:-apple-system,BlinkMacSystemFont,system-ui,sans-serif;color:var(--label);overscroll-behavior:none}
.app{max-width:480px;margin:0 auto;height:100vh;height:100dvh;position:relative;overflow:hidden;background:var(--bg);color:var(--label)}
.scr{position:absolute;inset:0;display:none;flex-direction:column}
.scr.on{display:flex;animation:slidein .3s cubic-bezier(.2,.8,.2,1)}
@keyframes slidein{from{opacity:0;transform:translateX(14px)}to{opacity:1;transform:translateX(0)}}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.safe-top{padding-top:env(safe-area-inset-top)}
.nav{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 2px;min-height:44px}
.side{min-width:80px;display:flex;align-items:center;color:var(--accent);font-size:17px;cursor:pointer;border:none;background:none;font-family:inherit}
.side.r{justify-content:flex-end}.side:active,.iconbtn:active{opacity:.5}
.lt{font-family:'Sora',-apple-system,sans-serif;font-size:31px;font-weight:800;letter-spacing:-1px;padding:2px 16px 10px}
.lk-title,.ptext{font-family:'Sora',-apple-system,sans-serif}
button{border:none}
.iconbtn{width:38px;height:38px;border-radius:19px;display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:24px;cursor:pointer;border:none;background:none}
/* day/night switch — from Uiverse.io by andrew-demchenk0 (MIT) */
.switch{font-size:17px;position:relative;display:inline-block;width:64px;height:34px}
.switch input{opacity:0;width:0;height:0}
.slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background-color:#73C0FC;transition:.4s;border-radius:30px}
.slider:before{position:absolute;content:"";height:30px;width:30px;border-radius:20px;left:2px;bottom:2px;z-index:2;background-color:#e8e8e8;transition:.4s}
.sun svg{position:absolute;top:6px;left:36px;z-index:1;width:24px;height:24px}
.moon svg{fill:#73C0FC;position:absolute;top:5px;left:5px;z-index:1;width:24px;height:24px}
.sun svg{animation:sunrotate 15s linear infinite}
@keyframes sunrotate{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.moon svg{animation:moontilt 5s linear infinite}
@keyframes moontilt{0%{transform:rotate(0deg)}25%{transform:rotate(-10deg)}75%{transform:rotate(10deg)}100%{transform:rotate(0deg)}}
.input:checked + .slider{background-color:#183153}
.input:focus + .slider{box-shadow:0 0 1px #183153}
.input:checked + .slider:before{transform:translateX(30px)}
/* home */
.grid{display:flex;flex-wrap:wrap;padding:8px 12px}
.cell{width:25%;display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 0;cursor:pointer;border:none;background:none;font-family:inherit;position:relative}
.tile{width:67px;height:67px;border-radius:19px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:35px;box-shadow:0 5px 13px rgba(26,26,58,.22);position:relative;overflow:hidden;transition:transform .12s}
.tile::after{content:"";position:absolute;inset:0;background:linear-gradient(155deg,rgba(255,255,255,.3),rgba(255,255,255,0) 48%)}
.tile i{position:relative}.cell:active .tile{transform:scale(.9)}
.tlbl{font-size:12px;color:var(--label);font-weight:500;max-width:74px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.privacy{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--sec);font-size:13px;margin-top:16px}
/* cards/list */
.hdr{font-size:13px;color:var(--sec);margin:18px 0 7px 32px;text-transform:uppercase;letter-spacing:.3px}
.card{margin:0 16px;background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.row{display:flex;align-items:center;gap:12px;padding:13px 14px;color:var(--label);font-size:16px;cursor:pointer;border:none;background:none;width:100%;font-family:inherit;text-align:left}
.row+.row{border-top:.5px solid var(--sep)}.row:active{background:var(--elev)}
.row .sub{font-size:13px;color:var(--sec);margin-top:1px}
.row .sq{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:18px;flex:none}
.row .chev{margin-left:auto;color:#C6C6C8;font-size:18px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--sec);padding:40px;text-align:center}
.empty i{font-size:64px;color:#C6C6C8}
.big{margin:18px 16px;background:var(--accent);color:#fff;border:none;border-radius:16px;padding:16px;font-size:17px;font-weight:600;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}.big:active{transform:scale(.98)}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:3px}
.pgrid img,.pv{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#ddd;cursor:pointer;border-radius:3px;position:relative;overflow:hidden}.pgrid img:active{opacity:.7}
.pv video{width:100%;height:100%;object-fit:cover}.pv i{position:absolute;bottom:5px;right:6px;color:#fff;font-size:16px;text-shadow:0 1px 3px rgba(0,0,0,.6)}
.viewer video{flex:1;width:100%;object-fit:contain;min-height:0}
/* echte app-iconen op de tegels */
.tile.applogo{background:#fff !important;padding:0}
.tile.applogo::after{display:none}
.tile.applogo img{width:100%;height:100%;object-fit:cover;border-radius:19px}
.tile.applogo.alt img{object-fit:contain;padding:11px;background:#fff}
/* PORTAL INTRO */
#s-portal{display:none;background:radial-gradient(circle at 50% 50%,#1a1145 0%,#0a0820 55%,#000 100%);align-items:center;justify-content:center;cursor:pointer}
#s-portal.on{display:flex}
.stars{position:absolute;inset:0;overflow:hidden}
.star{position:absolute;top:50%;left:50%;width:3px;height:3px;border-radius:50%;background:#fff;animation:warp 2.4s linear infinite}
@keyframes warp{0%{transform:translate(-50%,-50%) scale(0);opacity:0}12%{opacity:1}100%{transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty))) scale(1.6);opacity:0}}
.pring{position:absolute;border-radius:50%;border:2px solid;animation:pring 2.6s ease-out infinite}
@keyframes pring{0%{transform:scale(.1);opacity:0}25%{opacity:.9}100%{transform:scale(2.4);opacity:0}}
.pcore{width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#fff 0%,#cdbcff 35%,#7d7aff 60%,rgba(125,122,240,0) 75%);animation:pcore 2.2s ease-in-out infinite;position:relative;z-index:2}
@keyframes pcore{0%,100%{transform:scale(.85);filter:brightness(1)}50%{transform:scale(1.15);filter:brightness(1.4)}}
.ptext{position:absolute;bottom:60px;color:#cdbcff;font-size:14px;letter-spacing:2px;opacity:.85;z-index:3}
/* LOCK (liquid glass) */
#s-lock{background:#0a0820;overflow:hidden}
.lk-bg{position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,#3a2c8a,transparent 45%),radial-gradient(circle at 80% 70%,#7a2c8a,transparent 45%),radial-gradient(circle at 50% 90%,#2c6a8a,transparent 40%),#0a0820}
.lockwrap{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding-bottom:30px;z-index:1}
.lk-title{color:#fff;font-size:20px;font-weight:600}
.dots{display:flex;gap:22px}
.pd{width:15px;height:15px;border-radius:8px;border:2px solid #fff}.pd.f{background:#fff}
.keys{display:grid;grid-template-columns:repeat(3,76px);gap:16px;justify-content:center}
.key{position:relative;width:76px;height:76px;border-radius:50%;background:rgba(255,255,255,.12);-webkit-backdrop-filter:blur(10px) saturate(1.6);backdrop-filter:blur(10px) saturate(1.6);cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 1px 1px rgba(255,255,255,.55),0 6px 16px rgba(0,0,0,.3)}
.key::after{content:"";position:absolute;inset:0;background:linear-gradient(150deg,rgba(255,255,255,.4),rgba(255,255,255,0) 45%);pointer-events:none}
.key:active{background:rgba(255,255,255,.32);transform:scale(.94)}
.key .num{font-size:32px;color:#fff;font-weight:400;line-height:1}
.key .abc{font-size:10px;color:#fff;letter-spacing:2px;margin-top:2px;opacity:.85}
.kx{width:76px;height:76px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;background:none;border:none;cursor:pointer}
.faceid{width:76px;height:76px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#cdbcff;background:none;border:none;cursor:pointer;font-family:inherit;font-size:10px}
.faceid i{font-size:34px}.faceid:active{opacity:.5}
.shake{animation:sh .4s}@keyframes sh{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}60%{transform:translateX(10px)}}
.lk-forgot{background:none;border:none;color:rgba(255,255,255,.7);font-size:14px;cursor:pointer;font-family:inherit;margin-top:8px;display:none;text-decoration:underline}
.lk-forgot:active{opacity:.5}
.scan{position:absolute;inset:0;background:rgba(10,8,32,.9);display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:5;color:#fff}
.scan.on{display:flex}
.scan i{font-size:80px;color:#cdbcff;animation:scanp 1s ease-in-out infinite}
@keyframes scanp{0%,100%{opacity:.5;transform:scale(.95)}50%{opacity:1;transform:scale(1.05)}}
/* viewer/editor/sheet */
.viewer,.editor,.sheet{position:absolute;inset:0;display:none;flex-direction:column;z-index:40}
.viewer.on,.editor.on{display:flex;animation:fadein .25s ease}.sheet.on{display:flex;justify-content:flex-end;animation:fadein .25s ease}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.viewer{background:#000}
.viewer .vbar{display:flex;justify-content:space-between;align-items:center;padding:calc(8px + env(safe-area-inset-top)) 18px 8px;color:#fff}
.viewer .vbar button{color:#fff;background:none;border:none;font-size:17px;cursor:pointer;font-family:inherit}
.viewer img{flex:1;width:100%;object-fit:contain;min-height:0}
.vtools{position:absolute;left:0;right:0;bottom:0;display:flex;justify-content:center;gap:40px;padding:14px 0 calc(20px + env(safe-area-inset-bottom));background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.55))}
.vtools button{display:flex;flex-direction:column;align-items:center;gap:3px;color:#fff;background:none;border:none;font-size:12px;cursor:pointer;font-family:inherit}.vtools button i{font-size:26px}.vtools button:active{opacity:.5}
/* uitklappende verwijder-knop — from Uiverse.io by vinodjangid07 (MIT) */
.Btn{display:flex;align-items:center;justify-content:flex-start;width:45px;height:45px;border:none;border-radius:50%;cursor:pointer;position:relative;overflow:hidden;transition-duration:.3s;box-shadow:2px 2px 10px rgba(0,0,0,.199);background-color:rgb(255,65,65)}
.sign{width:100%;transition-duration:.3s;display:flex;align-items:center;justify-content:center}
.sign svg{width:17px}
.sign svg path{fill:#fff}
.text{position:absolute;right:0%;width:0%;opacity:0;color:#fff;font-size:1.2em;font-weight:600;transition-duration:.3s;white-space:nowrap}
.Btn:hover,.Btn.open{width:125px;border-radius:40px;transition-duration:.3s}
.Btn:hover .sign,.Btn.open .sign{width:30%;transition-duration:.3s;padding-left:20px}
.Btn:hover .text,.Btn.open .text{opacity:1;width:70%;transition-duration:.3s;padding-right:10px}
.Btn:active .text{opacity:1;width:70%;padding-right:10px}
/* uitklappende verwijder-knop (variant) — from Uiverse.io by vinodjangid07 (MIT) */
.button{width:50px;height:50px;border-radius:50%;background-color:rgb(20,20,20);border:none;font-weight:600;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(0,0,0,.164);cursor:pointer;transition-duration:.3s;overflow:hidden;position:relative}
.svgIcon{width:12px;transition-duration:.3s}
.svgIcon path{fill:#fff}
.button:hover{width:130px;border-radius:50px;transition-duration:.3s;background-color:rgb(255,69,69);align-items:center}
.button:hover .svgIcon{width:46px;transition-duration:.3s;transform:translateY(60%)}
.button::before{position:absolute;top:-20px;content:attr(data-label);color:#fff;transition-duration:.3s;font-size:2px}
.button:hover::before{font-size:13px;opacity:1;transform:translateY(30px);transition-duration:.3s}
.button:active,.button.open{width:130px;border-radius:50px;background-color:rgb(255,69,69);align-items:center}
.button:active .svgIcon,.button.open .svgIcon{width:46px;transform:translateY(60%)}
.button:active::before,.button.open::before{font-size:13px;opacity:1;transform:translateY(30px)}
.editor{background:var(--card)}
.editor textarea{flex:1;border:none;outline:none;padding:14px 18px;font-size:17px;line-height:1.5;font-family:inherit;resize:none;background:var(--card);color:var(--label)}
.sheet{background:rgba(0,0,0,.4)}
.sheet.on .panel{animation:slideup .32s cubic-bezier(.2,.8,.2,1)}
@keyframes slideup{from{transform:translateY(50px)}to{transform:translateY(0)}}
.sheet .panel{width:100%;background:var(--grp);border-radius:20px 20px 0 0;max-height:82%;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.sbar{display:flex;justify-content:space-between;align-items:center;padding:14px 16px}.sbar button{color:var(--accent);background:none;border:none;font-size:17px;cursor:pointer;font-family:inherit}
.field{margin:0 16px;background:var(--card);border-radius:12px}
.field input{width:100%;border:none;outline:none;padding:13px 14px;font-size:16px;font-family:inherit;background:none;color:var(--label)}.field input+input{border-top:.5px solid var(--sep)}
.toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%);background:rgba(28,28,46,.96);color:#fff;font-size:14px;padding:11px 18px;border-radius:14px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:90;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.3)}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- PORTAL INTRO -->
  <section class="scr on" id="s-portal" onclick="K.skipPortal()">
    <div class="stars" id="stars"></div>
    <div class="pring" id="pr1" style="width:140px;height:140px;border-color:#cdbcff"></div>
    <div class="pring" id="pr2" style="width:140px;height:140px;border-color:#8e84ff;animation-delay:.5s"></div>
    <div class="pring" id="pr3" style="width:140px;height:140px;border-color:#6e6bf0;animation-delay:1s"></div>
    <div class="pcore"></div>
    <div class="ptext">PORTARI</div>
  </section>

  <!-- LOCK -->
  <section class="scr" id="s-lock">
    <div class="lk-bg"></div>
    <div class="lockwrap safe-top">
      <i class="ti ti-lock" style="font-size:34px;color:#fff"></i>
      <div class="lk-title" id="lock-title">Voer je code in</div>
      <div class="dots" id="dots"></div>
      <div class="keys" id="keys"></div>
      <button class="lk-forgot" id="forgot" data-i18n="forgot" onclick="K.forgot()">Code vergeten? Opnieuw instellen</button>
    </div>
    <div class="scan" id="scan"><i class="ti ti-face-id"></i><div>Face ID…</div></div>
  </section>

  <!-- HOME -->
  <section class="scr" id="s-home">
    <div class="scroll safe-top">
      <div class="nav">
        <label class="switch">
          <input type="checkbox" class="input" id="dntoggle">
          <span class="slider"></span>
          <span class="sun"><svg viewBox="0 0 24 24" fill="#ffd43b"><circle cx="12" cy="12" r="5"></circle><g stroke="#ffd43b" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4"></line><line x1="12" y1="20" x2="12" y2="22"></line><line x1="2" y1="12" x2="4" y2="12"></line><line x1="20" y1="12" x2="22" y2="12"></line><line x1="4.9" y1="4.9" x2="6.3" y2="6.3"></line><line x1="17.7" y1="17.7" x2="19.1" y2="19.1"></line><line x1="4.9" y1="19.1" x2="6.3" y2="17.7"></line><line x1="17.7" y1="6.3" x2="19.1" y2="4.9"></line></g></svg></span>
          <span class="moon"><svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.39 5.39 0 0 1-4.4 2.26 5.4 5.4 0 0 1-4.5-8.4A9 9 0 0 0 12 3z"></path></svg></span>
        </label>
        <div class="navright"><div class="langdd" id="langdd"></div><button class="Btn" onclick="K.lockBtn(this)" aria-label="Vergrendel"><span class="sign"><svg viewBox="0 0 512 512"><path d="M377.9 105.9L500.7 228.7c7.2 7.2 11.3 17.1 11.3 27.3s-4.1 20.1-11.3 27.3L377.9 406.1c-6.4 6.4-15 9.9-24 9.9c-18.7 0-33.9-15.2-33.9-33.9l0-62.1-128 0c-17.7 0-32-14.3-32-32l0-64c0-17.7 14.3-32 32-32l128 0 0-62.1c0-18.7 15.2-33.9 33.9-33.9c9 0 17.6 3.6 24 9.9zM160 96L96 96c-17.7 0-32 14.3-32 32l0 256c0 17.7 14.3 32 32 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32l-64 0c-53 0-96-43-96-96L0 128C0 75 43 32 96 32l64 0c17.7 0 32 14.3 32 32s-14.3 32-32 32z"/></svg></span><span class="text" data-i18n="lock">Vergrendel</span></button></div>
      </div>
      <div class="lt" data-i18n="vault">Kluis</div>
      <div class="grid">
        <button class="cell" onclick="K.go('s-photos')"><div class="tile" style="background:#FF2D55"><i class="ti ti-photo"></i></div><span class="tlbl" data-i18n="photos">Foto's</span></button>
        <button class="cell" onclick="K.go('s-files')"><div class="tile" style="background:#34C759"><i class="ti ti-folder"></i></div><span class="tlbl" data-i18n="files">Bestanden</span></button>
        <button class="cell" onclick="K.go('s-notes')"><div class="tile" style="background:#FF9500"><i class="ti ti-note"></i></div><span class="tlbl" data-i18n="notes">Notities</span></button>
        <button class="cell" onclick="K.go('s-apps')"><div class="tile" style="background:#5E5CE6"><i class="ti ti-apps"></i></div><span class="tlbl" data-i18n="apps">Apps</span></button>
      </div>
      <div id="home-apps-hdr" style="display:none;font-size:13px;color:var(--sec);font-weight:600;margin:6px 0 -2px 18px" data-i18n="myapps">Mijn apps</div>
      <div class="grid" id="home-apps"></div>
      <div class="privacy"><i class="ti ti-lock" style="font-size:13px"></i><span data-i18n="ondevice">Alles blijft op dit toestel</span></div>
    </div>

  var pin='',firstPin=null,editingNote=null,viewingPhoto=null,portalTimer=null;

  function go(id){document.querySelectorAll('.scr').forEach(function(s){s.classList.remove('on')});$(id).classList.add('on');if(id==='s-home')renderHomeApps();if(id==='s-photos')renderPhotos();if(id==='s-files')renderFiles();if(id==='s-notes')renderNotes();if(id==='s-apps')renderApps()}

  function buildStars(){var c=$('stars');c.innerHTML='';for(var i=0;i<64;i++){var a=Math.random()*Math.PI*2,d=120+Math.random()*340;var s=document.createElement('div');s.className='star';s.style.setProperty('--tx',(Math.cos(a)*d).toFixed(0)+'px');s.style.setProperty('--ty',(Math.sin(a)*d).toFixed(0)+'px');s.style.animationDelay=(Math.random()*2.4).toFixed(2)+'s';s.style.width=s.style.height=(1+Math.random()*2.5).toFixed(1)+'px';c.appendChild(s)}}

  // PIN
  function setupPin(){var has=!!localStorage.getItem('kluis_pin');$('lock-title').textContent=has?t('entercode'):(firstPin?t('confirmcode'):t('choosecode'));$('forgot').style.display=has?'block':'none'}
  function forgot(){if(!confirm('Code opnieuw instellen? Je stelt straks een nieuwe code in. Je opgeslagen foto’s, bestanden en notities blijven gewoon staan.'))return;localStorage.removeItem('kluis_pin');pin='';firstPin=null;setupPin();renderDots();toast('Stel een nieuwe code in')}
  function renderDots(){var h='';for(var i=0;i<4;i++)h+='<div class="pd'+(i<pin.length?' f':'')+'"></div>';$('dots').innerHTML=h}
  function renderKeys(){var k=$('keys');k.innerHTML='';[1,2,3,4,5,6,7,8,9,'face',0,'x'].forEach(function(v){if(v==='face'){var f=document.createElement('button');f.className='faceid';f.innerHTML='<i class="ti ti-face-id"></i>';f.onclick=faceID;k.appendChild(f);return}if(v==='x'){var b=document.createElement('button');b.className='kx';b.innerHTML='<i class="ti ti-backspace"></i>';b.onclick=function(){pin=pin.slice(0,-1);renderDots()};k.appendChild(b);return}var btn=document.createElement('button');btn.className='key';btn.innerHTML='<span class="num">'+v+'</span>'+(ABC[v]?'<span class="abc">'+ABC[v]+'</span>':'');btn.onclick=function(){press(''+v)};k.appendChild(btn)})}
  function press(d){if(pin.length>=4)return;pin+=d;renderDots();if(pin.length===4)setTimeout(submitPin,140)}
  function submitPin(){var has=localStorage.getItem('kluis_pin');if(has){if(pin===has){pin='';go('s-home')}else{shake();pin=''}}else{if(!firstPin){firstPin=pin;pin='';renderDots();setupPin()}else{if(pin===firstPin){localStorage.setItem('kluis_pin',pin);pin='';firstPin=null;toast('Kluis aangemaakt');go('s-home')}else{shake();pin='';firstPin=null;setupPin()}}}renderDots()}
  function shake(){var w=$('dots');w.classList.add('shake');setTimeout(function(){w.classList.remove('shake')},400);if(navigator.vibrate)navigator.vibrate(70)}
  function faceID(){if(!localStorage.getItem('kluis_pin')){toast('Stel eerst een code in');return}$('scan').classList.add('on');setTimeout(function(){$('scan').classList.remove('on');go('s-home')},1100)}
  function lock(){pin='';firstPin=null;renderDots();setupPin();go('s-lock')}

  // foto's
  function isVid(t){return(t||'').indexOf('video')>-1}
  $('pin-photo').addEventListener('change',function(e){var fs=[].slice.call(e.target.files);if(!fs.length)return;Promise.all(fs.map(function(f){return readFile(f).then(function(d){return dbPut('photos',{id:uid(),data:d,type:f.type,ts:Date.now()})})})).then(function(){e.target.value='';renderPhotos();toast(fs.length+' toegevoegd')})});
  var vList=[],vIdx=0;
  function renderPhotos(){dbAll('photos').then(function(items){vList=items;var b=$('photos-body');if(!items.length){b.innerHTML='<div class="empty"><i class="ti ti-photo"></i><div>'+t('empty_photos')+'</div></div>';return}var h='<div class="pgrid">';items.forEach(function(it){if(isVid(it.type))h+='<div class="pv" data-id="'+it.id+'"><video src="'+it.data+'#t=0.1" muted preload="metadata"></video><i class="ti ti-player-play-filled"></i></div>';else h+='<img src="'+it.data+'" data-id="'+it.id+'">'});b.innerHTML=h+'</div>';b.querySelectorAll('img').forEach(function(img){img.onclick=function(){openAt(img.getAttribute('data-id'))}});b.querySelectorAll('.pv').forEach(function(p){var id=p.getAttribute('data-id');p.onclick=function(){openAt(id)}})})}
  function openAt(id){for(var i=0;i<vList.length;i++){if(vList[i].id===id){vIdx=i;break}}showV();$('viewer').classList.add('on')}
  function showV(){var it=vList[vIdx];if(!it)return;viewingPhoto=it.id;var iv=$('viewer-img'),vv=$('viewer-vid');if(vv.pause)vv.pause();if(isVid(it.type)){iv.style.display='none';iv.src='';vv.style.display='block';vv.src=it.data}else{vv.style.display='none';vv.src='';iv.style.display='block';iv.src=it.data}$('viewer-count').textContent=(vIdx+1)+' / '+vList.length}
  function vNext(){if(vIdx<vList.length-1){vIdx++;showV()}}
  function vPrev(){if(vIdx>0){vIdx--;showV()}}
  function closeViewer(){$('viewer').classList.remove('on');var vv=$('viewer-vid');if(vv.pause)vv.pause();vv.src='';$('viewer-img').src=''}
  function delPhoto(){if(!viewingPhoto)return;if(!confirm('Verwijderen?'))return;var delId=viewingPhoto;dbDel('photos',delId).then(function(){vList=vList.filter(function(x){return x.id!==delId});if(!vList.length){closeViewer()}else{if(vIdx>=vList.length)vIdx=vList.length-1;showV()}renderPhotos()})}
  (function(){var v=$('viewer'),sx=0,dx=0,act=false;v.addEventListener('touchstart',function(e){if(e.touches.length>1)return;sx=e.touches[0].clientX;dx=0;act=true},{passive:true});v.addEventListener('touchmove',function(e){if(act)dx=e.touches[0].clientX-sx},{passive:true});v.addEventListener('touchend',function(){if(!act)return;act=false;if(Math.abs(dx)>50){if(dx<0)vNext();else vPrev()}});document.addEventListener('keydown',function(e){if(!$('viewer').classList.contains('on'))return;if(e.key==='ArrowRight')vNext();else if(e.key==='ArrowLeft')vPrev();else if(e.key==='Escape')closeViewer()})})();
  function curPhoto(){return dbAll('photos').then(function(items){return items.filter(function(x){return x.id===viewingPhoto})[0]})}
  function nameFor(it){var blob=dataURLtoBlob(it.data),base=isVid(it.type)?'video':'foto',e=((blob.type.split('/')[1]||(isVid(it.type)?'mp4':'jpg')).split(';')[0]);return{name:base+'.'+e,blob:blob}}
  function sharePhoto(){curPhoto().then(function(it){if(!it)return;var nf=nameFor(it),file=new File([nf.blob],nf.name,{type:nf.blob.type});if(navigator.canShare&&navigator.canShare({files:[file]})){navigator.share({files:[file],title:'Bestand'}).catch(function(){})}else if(navigator.share){navigator.share({title:'Bestand'}).catch(function(){})}else{dlf(it.data,nf.name);toast('Delen niet ondersteund — bewaard')}})}
  function savePhoto(){curPhoto().then(function(it){if(it){var nf=nameFor(it);dlf(it.data,nf.name);toast('Bewaard')}})}

  // bestanden
  $('pin-file').addEventListener('change',function(e){var fs=[].slice.call(e.target.files);if(!fs.length)return;Promise.all(fs.map(function(f){return readFile(f).then(function(d){return dbPut('files',{id:uid(),name:f.name,type:f.type,size:f.size,data:d,ts:Date.now()})})})).then(function(){e.target.value='';renderFiles();toast(fs.length+' toegevoegd')})});
  function fileIcon(t){t=t||'';if(t.indexOf('pdf')>-1)return['file-type-pdf','#FF3B30'];if(t.indexOf('image')>-1)return['photo','#FF2D55'];if(t.indexOf('video')>-1)return['video','#FF9500'];if(t.indexOf('zip')>-1)return['file-zip','#8E8E93'];if(t.indexOf('word')>-1||t.indexOf('doc')>-1)return['file-text','#5E5CE6'];return['file','#8E8E93']}
  function hsize(n){if(!n)return'';var u=['B','KB','MB','GB'],i=0;while(n>=1024&&i<3){n/=1024;i++}return n.toFixed(i?1:0)+' '+u[i]}
  function renderFiles(){dbAll('files').then(function(items){var b=$('files-body');if(!items.length){b.innerHTML='<div class="empty"><i class="ti ti-folder"></i><div>'+t('empty_files')+'</div></div>';return}var h='<div class="card">';items.forEach(function(it){var ic=fileIcon(it.type);h+='<button class="row" data-id="'+it.id+'" data-name="'+esc(it.name||'bestand')+'"><i class="ti ti-'+ic[0]+'" style="font-size:24px;color:'+ic[1]+'"></i><div style="flex:1;min-width:0"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(it.name||'bestand')+'</div><div class="sub">'+hsize(it.size)+'</div></div><i class="ti ti-download chev"></i></button>'});b.innerHTML=h+'</div><div style="text-align:center;color:#8E8E93;font-size:13px;margin:14px">'+t('hint')+'</div>';b.querySelectorAll('.row').forEach(function(r){var id=r.getAttribute('data-id'),nm=r.getAttribute('data-name');r.onclick=function(){openFile(id,nm)};hold(r,function(){if(confirm('"'+nm+'" verwijderen?'))dbDel('files',id).then(renderFiles)})})})}
  function openFile(id,name){dbAll('files').then(function(items){var f=items.filter(function(x){return x.id===id})[0];if(f)dlf(f.data,name||'bestand')})}
  function hold(el,cb){var tm;function s(){tm=setTimeout(cb,600)}function c(){clearTimeout(tm)}el.addEventListener('touchstart',s,{passive:true});['touchend','touchmove'].forEach(function(ev){el.addEventListener(ev,c)});el.addEventListener('mousedown',s);['mouseup','mouseleave'].forEach(function(ev){el.addEventListener(ev,c)});el.addEventListener('contextmenu',function(e){e.preventDefault();cb()})}

  // notities
  function renderNotes(){var notes=ls('notes',[]);var b=$('notes-body');if(!notes.length){b.innerHTML='<div class="empty"><i class="ti ti-note"></i><div>'+t('empty_notes')+'</div></div>';return}notes.sort(function(a,b){return b.ts-a.ts});var h='<div class="card">';notes.forEach(function(n){var ti=(n.text.split('\n').find(function(l){return l.trim()})||'Nieuwe notitie').trim();var pr=n.text.split('\n').slice(1).join(' ').trim()||'Geen aanvullende tekst';h+='<button class="row" data-id="'+n.id+'"><div style="flex:1;min-width:0"><div style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(ti)+'</div><div class="sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(pr)+'</div></div><i class="ti ti-chevron-right chev"></i></button>'});b.innerHTML=h+'</div>';b.querySelectorAll('.row').forEach(function(r){r.onclick=function(){openNote(r.getAttribute('data-id'))}})}
  function newNote(){editingNote={id:uid()};$('note-text').value='';$('editor').classList.add('on');setTimeout(function(){$('note-text').focus()},80)}
  function openNote(id){var n=ls('notes',[]).filter(function(x){return x.id===id})[0];if(!n)return;editingNote={id:n.id};$('note-text').value=n.text;$('editor').classList.add('on')}
  function saveNote(){if(!editingNote){$('editor').classList.remove('on');return}var txt=$('note-text').value,notes=ls('notes',[]),i=notes.findIndex(function(x){return x.id===editingNote.id});if(txt.trim()===''){if(i>-1)notes.splice(i,1)}else{var rec={id:editingNote.id,text:txt,ts:Date.now()};if(i>-1)notes[i]=rec;else notes.push(rec)}lsSet('notes',notes);editingNote=null;$('editor').classList.remove('on');renderNotes()}
  function delNote(){if(!editingNote)return;if(!confirm('Notitie verwijderen?'))return;lsSet('notes',ls('notes',[]).filter(function(x){return x.id!==editingNote.id}));editingNote=null;$('editor').classList.remove('on');renderNotes()}

  // apps
  function host(u){return u.replace(/^https?:\/\//i,'').split('/')[0]}
  // Icoon-keten: echte app-icoon (apple-touch-icon) → consistente service → merk-glyph.
  // Vaste, juiste logo's voor apps waarvan de favicon mist of verkeerd is. Sleutel = host.
  var ICONMAP={
    'web.whatsapp.com':['https://web.whatsapp.com/apple-touch-icon.png',false],
    'www.google.com':['https://www.google.com/chrome/static/images/favicons/apple-icon-180x180.png',false],
    'mail.google.com':['https://www.gstatic.com/images/branding/product/2x/gmail_2020q4_48dp.png',true],
    'www.torproject.org':['https://cdn.simpleicons.org/torbrowser/7D4798',true]
  };
  function appCellHTML(a){var hh=host(a.url);var ov=ICONMAP[hh];var src=ov?ov[0]:('https://'+hh+'/apple-touch-icon.png');var s2=ov?'':('https://www.google.com/s2/favicons?domain='+hh+'&sz=128');var altc=(ov&&ov[1])?' alt':'';var nm=esc((a.name||'?').charAt(0).toUpperCase());return '<button class="cell" data-id="'+a.id+'" data-url="'+a.url+'"><div class="tile applogo'+altc+'"><img loading="lazy" src="'+src+'" data-c="'+a.color+'" data-nm="'+nm+'" data-s2="'+s2+'"></div><span class="tlbl">'+esc(a.name)+'</span></button>'}
  function wireAppIcons(b){b.querySelectorAll('.applogo img').forEach(function(img){img.onerror=function(){var s2=img.getAttribute('data-s2');if(s2){img.setAttribute('data-s2','');img.parentNode.classList.add('alt');img.src=s2;return}var t=img.parentNode;t.classList.remove('applogo','alt');t.style.background=img.getAttribute('data-c');t.innerHTML='<span style="color:#fff;font-weight:800;font-size:27px;font-family:Sora,-apple-system,sans-serif">'+img.getAttribute('data-nm')+'</span>'}})}
  function wireAppCells(b){b.querySelectorAll('.cell').forEach(function(c){var id=c.getAttribute('data-id'),url=c.getAttribute('data-url');c.onclick=function(){window.open(url,'_blank')};hold(c,function(){var a=ls('apps',[]).filter(function(x){return x.id===id})[0];if(a&&confirm('"'+a.name+'" verwijderen?')){lsSet('apps',ls('apps',[]).filter(function(x){return x.id!==id}));renderApps();renderHomeApps()}})})}
  function renderApps(){var apps=ls('apps',[]);var b=$('apps-body');if(!apps.length){b.innerHTML='<div class="empty"><i class="ti ti-apps"></i><div>'+t('empty_apps')+'</div></div>';return}var h='<div class="grid">';apps.forEach(function(a){h+=appCellHTML(a)});b.innerHTML=h+'</div><div style="text-align:center;color:#8E8E93;font-size:13px;margin:8px">'+t('hint')+'</div>';wireAppIcons(b);wireAppCells(b)}

  function openAddApp(){var pl=$('preset-list');var h='',cur=null;PRESETS.forEach(function(p){if(p.cat!==cur){if(cur!==null)h+='</div>';cur=p.cat;h+='<div class="hdr">'+t({'Sociaal & chat':'cat_social','Streaming':'cat_streaming','Browsers':'cat_browsers','Handig':'cat_handy'}[p.cat]||'cat_handy')+'</div><div class="card">'}h+='<button class="row" data-n="'+esc(p.name)+'" data-u="'+p.url+'" data-c="'+p.color+'" data-i="'+p.icon+'"><div class="sq" style="background:'+p.color+'"><i class="ti ti-'+p.icon+'"></i></div><div style="flex:1">'+esc(p.name)+'</div><i class="ti ti-plus chev"></i></button>'});if(cur!==null)h+='</div>';pl.innerHTML=h;pl.querySelectorAll('.row').forEach(function(r){r.onclick=function(){addApp(r.getAttribute('data-n'),r.getAttribute('data-u'),r.getAttribute('data-c'),r.getAttribute('data-i'))}});$('app-name').value='';$('app-url').value='';$('sheet').classList.add('on')}
